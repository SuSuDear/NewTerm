name: CI

on:
  push:
    paths-ignore:
      - '.gitignore'
      - '**/*.md'
      - 'assets/**'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - '**/*.md'
      - 'assets/**'
  workflow_dispatch:

env:
  THEOS: ''
  XCODE_VERSION: '15.4'

jobs:
  build:
    name: Build packages
    runs-on: macos-14

    steps:
      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install Homebrew dependencies
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALLED_DEPENDENTS_CHECK=1 brew install dpkg make ldid-procursus xz cmark
          echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Checkout roothide/theos
        uses: actions/checkout@v4
        with:
          repository: roothide/theos
          path: theos
          submodules: recursive

      - name: Add THEOS environment variables
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV

      - name: Checkout theos/sdks
        uses: actions/checkout@v4
        with:
          repository: theos/sdks
          ref: master
          path: theos/sdks

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        run: |
          echo "Available SDKs: $(find $THEOS/sdks -maxdepth 1 -name '*.sdk' -print)"
          echo "FINALPACKAGE=1" >> $GITHUB_ENV

      - name: Build packages
        run: |
          FINALPACKAGE=1 gmake clean package
          ROOTLESS=1 FINALPACKAGE=1 gmake clean package
          ROOTHIDE=1 FINALPACKAGE=1 gmake clean package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NewTerm3
          path: packages/*.deb
